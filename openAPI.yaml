openapi: 3.0.0
info:
  title: Fédération de Collectivités Agricoles
  description: API de gestion de la fédération agricole à Madagascar
  version: 2.0.0
servers:
  - url: 'http://localhost:8080'

paths:

  # ============================================================
  # PARTIE A — Ouverture d'une nouvelle collectivité
  # ============================================================

  /collectivites:
    get:
      summary: Lister toutes les collectivités
      tags: [Collectivités]
      responses:
        '200':
          description: Liste des collectivités retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivite'
    post:
      summary: Ouvrir une nouvelle collectivité
      tags: [Collectivités]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collectivite'
      responses:
        '201':
          description: Collectivité créée avec succès
        '400':
          description: Conditions d'ouverture non remplies
        '403':
          description: Autorisation de la fédération manquante

  /collectivites/{id}:
    get:
      summary: Obtenir une collectivité par son ID
      tags: [Collectivités]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Collectivité trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
        '404':
          description: Collectivité introuvable

  # ============================================================
  # PARTIE B — Admission d'un nouveau membre (mise à jour v2)
  # ============================================================

  /collectivites/{id}/membres:
    get:
      summary: Lister les membres d'une collectivité
      tags: [Membres]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des membres retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membre'
        '404':
          description: Collectivité introuvable
    post:
      summary: Admettre un nouveau membre
      description: >
        Conditions d'admission mises à jour le 21 avril 2026.
        Le candidat doit être parrainé par au moins deux membres confirmés,
        dont le nombre de parrains issus de la collectivité cible doit être
        supérieur ou égal au nombre de parrains extérieurs.
        Il doit aussi régler les frais d'adhésion (50 000 MGA) ainsi que
        l'intégralité des cotisations annuelles imposées par la collectivité.
      tags: [Membres]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandeAdhesion'
      responses:
        '201':
          description: Membre admis avec succès
        '400':
          description: Informations manquantes ou invalides
        '403':
          description: >
            Conditions de parrainage non respectées —
            le nombre de parrains internes doit être >= parrains externes
        '404':
          description: Collectivité introuvable
        '422':
          description: Frais d'adhésion ou cotisations annuelles non réglés

  /collectivites/{id}/membres/{membreId}:
    get:
      summary: Obtenir un membre par son ID
      tags: [Membres]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: membreId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Membre trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          description: Membre ou collectivité introuvable

  /collectivites/{id}/membres/{membreId}/demission:
    post:
      summary: Démissionner d'une collectivité
      tags: [Membres]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: membreId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Démission enregistrée avec succès
        '404':
          description: Membre ou collectivité introuvable

  /membres/{membreId}/changement-collectivite:
    post:
      summary: Changer de collectivité
      tags: [Membres]
      parameters:
        - name: membreId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nouvelle_collectivite_id:
                  type: integer
                  description: ID de la nouvelle collectivité
              required:
                - nouvelle_collectivite_id
      responses:
        '200':
          description: Changement de collectivité effectué avec succès
        '404':
          description: Membre ou collectivité introuvable

  # ============================================================
  # PARTIE C — Cotisations et paiements
  # ============================================================

  /collectivites/{id}/cotisations:
    get:
      summary: Lister les cotisations d'une collectivité
      tags: [Cotisations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des cotisations retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cotisation'
        '404':
          description: Collectivité introuvable
    post:
      summary: Enregistrer une cotisation
      tags: [Cotisations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cotisation'
      responses:
        '201':
          description: Cotisation enregistrée avec succès
        '400':
          description: Données invalides
        '422':
          description: Règle métier non respectée (montant invalide)
        '404':
          description: Collectivité introuvable

  /collectivites/{id}/cotisations/{cotisationId}:
    get:
      summary: Obtenir une cotisation par son ID
      tags: [Cotisations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: cotisationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cotisation trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '404':
          description: Cotisation ou collectivité introuvable

  # ============================================================
  # PARTIE D — Situation de trésorerie
  # ============================================================

  /collectivites/{id}/comptes:
    get:
      summary: Lister les comptes d'une collectivité
      tags: [Trésorerie]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des comptes retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'
        '404':
          description: Collectivité introuvable
    post:
      summary: Ajouter un compte à une collectivité
      tags: [Trésorerie]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Compte'
      responses:
        '201':
          description: Compte créé avec succès
        '400':
          description: Données invalides
        '422':
          description: Une caisse existe déjà pour cette collectivité

  /collectivites/{id}/comptes/{compteId}:
    get:
      summary: Obtenir un compte par son ID
      tags: [Trésorerie]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: compteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Compte trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '404':
          description: Compte ou collectivité introuvable

  # ============================================================
  # PARTIE E — Activités
  # ============================================================

  /collectivites/{id}/activites:
    get:
      summary: Lister les activités d'une collectivité
      tags: [Activités]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des activités retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Activite'
        '404':
          description: Collectivité introuvable
    post:
      summary: Planifier une nouvelle activité
      tags: [Activités]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activite'
      responses:
        '201':
          description: Activité planifiée avec succès
        '400':
          description: Données invalides
        '404':
          description: Collectivité introuvable

  /collectivites/{id}/activites/{activiteId}:
    get:
      summary: Obtenir une activité par son ID
      tags: [Activités]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: activiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Activité trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activite'
        '404':
          description: Activité ou collectivité introuvable

  # ============================================================
  # PARTIE F — Assiduité des membres
  # ============================================================

  /collectivites/{id}/activites/{activiteId}/presences:
    get:
      summary: Lister les présences d'une activité
      tags: [Assiduité]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: activiteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Liste des présences retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Presence'
        '404':
          description: Activité ou collectivité introuvable
    post:
      summary: Enregistrer une présence
      tags: [Assiduité]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: activiteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Presence'
      responses:
        '201':
          description: Présence enregistrée avec succès
        '400':
          description: Données invalides
        '404':
          description: Activité, membre ou collectivité introuvable

  # ============================================================
  # PARTIE G — Statistiques d'une collectivité
  # ============================================================

  /collectivites/{id}/statistiques:
    get:
      summary: Obtenir les statistiques globales d'une collectivité
      description: >
        Retourne le taux d'assiduité global et le nombre de membres
        inscrits pour le rapport mensuel à envoyer à la fédération.
      tags: [Statistiques]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: date_debut
          in: query
          required: true
          description: Début de la période
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: date_fin
          in: query
          required: true
          description: Fin de la période
          schema:
            type: string
            format: date
            example: "2026-04-21"
      responses:
        '200':
          description: Statistiques retournées avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatCollectivite'
        '404':
          description: Collectivité introuvable

  /collectivites/{id}/statistiques/membres:
    get:
      summary: Obtenir les statistiques détaillées par membre
      description: >
        Retourne pour chaque membre actif son taux d'assiduité,
        le montant encaissé et le montant impayé sur une période donnée.
      tags: [Statistiques]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: date_debut
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: date_fin
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-04-21"
      responses:
        '200':
          description: Statistiques membres retournées avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatMembre'
        '404':
          description: Collectivité introuvable

  # ============================================================
  # PARTIE H — Statistiques de la fédération
  # ============================================================

  /federation/statistiques:
    get:
      summary: Obtenir le rapport global de la fédération
      description: >
        Retourne pour chaque collectivité le taux d'assiduité global,
        le pourcentage de membres à jour dans leurs cotisations,
        et le nombre de nouveaux adhérents sur une période donnée.
        Utilisé pour le rapport mensuel et annuel du secrétaire de la fédération.
      tags: [Statistiques Fédération]
      parameters:
        - name: date_debut
          in: query
          required: true
          description: Début de la période
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: date_fin
          in: query
          required: true
          description: Fin de la période
          schema:
            type: string
            format: date
            example: "2026-04-21"
      responses:
        '200':
          description: Rapport global retourné avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatFederation'
        '400':
          description: Période invalide

  /federation/statistiques/rapport-mensuel:
    get:
      summary: Obtenir le rapport mensuel de la fédération
      tags: [Statistiques Fédération]
      parameters:
        - name: mois
          in: query
          required: true
          description: Mois du rapport (format MM)
          schema:
            type: string
            example: "04"
        - name: annee
          in: query
          required: true
          description: Année du rapport (format YYYY)
          schema:
            type: string
            example: "2026"
      responses:
        '200':
          description: Rapport mensuel retourné avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatFederation'
        '400':
          description: Mois ou année invalide

  /federation/statistiques/rapport-annuel:
    get:
      summary: Obtenir le rapport annuel de la fédération
      tags: [Statistiques Fédération]
      parameters:
        - name: annee
          in: query
          required: true
          description: Année du rapport (format YYYY)
          schema:
            type: string
            example: "2026"
      responses:
        '200':
          description: Rapport annuel retourné avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatFederation'
        '400':
          description: Année invalide

# ============================================================
# COMPOSANTS — Schémas
# ============================================================

components:
  schemas:

    Collectivite:
      type: object
      properties:
        id:
          type: integer
          description: Numéro unique de la collectivité
          example: 1
        nom:
          type: string
          description: Nom unique de la collectivité
          example: "Collectivité Rizicole d'Antananarivo"
        ville:
          type: string
          description: Ville où exerce la collectivité
          example: "Antananarivo"
        specialite:
          type: string
          description: Spécialité agricole
          example: "Riziculture"
        date_creation:
          type: string
          format: date
          description: Date de création
          example: "2020-03-15"
        cotisation_annuelle:
          type: number
          format: float
          description: Montant des cotisations annuelles imposées par la collectivité (MGA)
          example: 200000.0
      required:
        - nom
        - ville
        - specialite
        - date_creation
        - cotisation_annuelle

    Parrain:
      type: object
      description: Informations sur un parrain et sa relation avec le candidat
      properties:
        membre_id:
          type: integer
          description: ID du membre confirmé qui parraine
          example: 5
        collectivite_id:
          type: integer
          description: ID de la collectivité du parrain
          example: 1
        relation:
          type: string
          description: Nature de la relation entre le parrain et le candidat
          enum:
            - famille
            - ami
            - collegue
            - autre
          example: famille
      required:
        - membre_id
        - collectivite_id
        - relation

    DemandeAdhesion:
      type: object
      description: >
        Demande d'adhésion d'un nouveau membre (conditions mises à jour le 21/04/2026).
        Au moins 2 parrains confirmés requis, dont le nombre de parrains internes
        doit être >= au nombre de parrains externes.
      properties:
        nom:
          type: string
          example: "Rakoto"
        prenom:
          type: string
          example: "Jean"
        date_naissance:
          type: string
          format: date
          example: "1990-05-10"
        genre:
          type: string
          enum:
            - masculin
            - feminin
          example: masculin
        adresse:
          type: string
          example: "Lot 12 Antananarivo"
        metier:
          type: string
          example: "Riziculteur"
        telephone:
          type: string
          example: "034 12 345 67"
        email:
          type: string
          format: email
          example: "jean.rakoto@email.com"
        parrains:
          type: array
          description: Liste des parrains (minimum 2 membres confirmés)
          minItems: 2
          items:
            $ref: '#/components/schemas/Parrain'
        frais_adhesion:
          type: number
          format: float
          description: Frais d'adhésion fixes (50 000 MGA)
          example: 50000.0
        cotisation_annuelle_payee:
          type: number
          format: float
          description: Montant des cotisations annuelles de la collectivité réglées
          example: 200000.0
      required:
        - nom
        - prenom
        - date_naissance
        - genre
        - adresse
        - metier
        - telephone
        - email
        - parrains
        - frais_adhesion
        - cotisation_annuelle_payee

    Membre:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nom:
          type: string
          example: "Rakoto"
        prenom:
          type: string
          example: "Jean"
        date_naissance:
          type: string
          format: date
          example: "1990-05-10"
        genre:
          type: string
          enum:
            - masculin
            - feminin
          example: masculin
        adresse:
          type: string
          example: "Lot 12 Antananarivo"
        metier:
          type: string
          example: "Riziculteur"
        telephone:
          type: string
          example: "034 12 345 67"
        email:
          type: string
          format: email
          example: "jean.rakoto@email.com"
        date_adhesion:
          type: string
          format: date
          example: "2024-01-15"
        poste:
          type: string
          enum:
            - president
            - president_adjoint
            - tresorier
            - secretaire
            - membre_confirme
            - membre_junior
          example: membre_junior
      required:
        - nom
        - prenom
        - date_naissance
        - genre
        - adresse
        - metier
        - telephone
        - email

    Cotisation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        montant:
          type: number
          format: float
          description: Montant de la cotisation en Ariary (MGA)
          example: 50000.0
        date:
          type: string
          format: date
          example: "2026-04-20"
        type_cotisation:
          type: string
          enum:
            - mensuelle
            - annuelle
            - ponctuelle
          example: mensuelle
        mode_paiement:
          type: string
          enum:
            - espece
            - virement_bancaire
            - mobile_money
          example: mobile_money
        membre_id:
          type: integer
          example: 3
      required:
        - montant
        - date
        - type_cotisation
        - mode_paiement
        - membre_id

    Compte:
      type: object
      properties:
        id:
          type: integer
          example: 1
        type_compte:
          type: string
          enum:
            - caisse
            - bancaire
            - mobile_money
          example: bancaire
        solde:
          type: number
          format: float
          description: Solde actuel en Ariary (MGA)
          example: 150000.0
        titulaire:
          type: string
          example: "Rakoto Jean"
        nom_banque:
          type: string
          enum:
            - BRED
            - MCB
            - BMOI
            - BOA
            - BGFI
            - AFG
            - ACCES_BANQUE
            - BAOBAB
            - SIPEM
          example: BOA
        numero_compte:
          type: string
          description: Numéro de compte bancaire (23 chiffres)
          pattern: '^\d{5}\d{5}\d{11}\d{2}$'
          example: "00001000011234567890100"
        service_mobile:
          type: string
          enum:
            - Orange_Money
            - Mvola
            - Airtel_Money
          example: Mvola
        numero_telephone:
          type: string
          example: "034 12 345 67"
      required:
        - type_compte
        - solde
        - titulaire

    Activite:
      type: object
      properties:
        id:
          type: integer
          example: 1
        type_activite:
          type: string
          enum:
            - assemblee_generale
            - formation_junior
            - exceptionnelle
          example: assemblee_generale
        date:
          type: string
          format: date
          example: "2026-05-10"
        description:
          type: string
          example: "Assemblée générale mensuelle de mai"
        presence_obligatoire:
          type: boolean
          example: true
      required:
        - type_activite
        - date
        - presence_obligatoire

    Presence:
      type: object
      properties:
        id:
          type: integer
          example: 1
        membre_id:
          type: integer
          example: 3
        statut:
          type: string
          enum:
            - present
            - absent_excuse
            - absent
          example: present
        motif:
          type: string
          description: Motif d'absence si excusé
          example: "Maladie"
      required:
        - membre_id
        - statut

    StatMembre:
      type: object
      description: Statistiques détaillées d'un membre actif sur une période donnée
      properties:
        membre_id:
          type: integer
          example: 3
        nom:
          type: string
          example: "Rakoto Jean"
        taux_assiduite:
          type: number
          format: float
          description: Taux d'assiduité du membre en pourcentage
          example: 85.5
        montant_encaisse:
          type: number
          format: float
          description: Total des cotisations payées sur la période (MGA)
          example: 150000.0
        montant_impaye:
          type: number
          format: float
          description: Total des cotisations impayées sur la période (MGA)
          example: 50000.0
      required:
        - membre_id
        - taux_assiduite
        - montant_encaisse
        - montant_impaye

    StatCollectivite:
      type: object
      description: Statistiques globales d'une collectivité pour le rapport mensuel
      properties:
        collectivite_id:
          type: integer
          example: 1
        nom_collectivite:
          type: string
