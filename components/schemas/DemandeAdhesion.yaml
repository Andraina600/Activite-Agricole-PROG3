type: object

properties:

  id:
    type: integer
    description: Identifiant unique de la demande d'adhésion
    example: 101

  membre_id:
    type: integer
    description: Identifiant du membre concerné par la demande
    example: 42

  collectivite_id:
    type: integer
    description: Identifiant de la collectivité cible
    example: 1

  parrain_id:
    type: integer
    description: Identifiant du membre confirmé qui parraine la demande
    example: 7

  date_demande:
    type: string
    format: date
    description: Date de la demande d'adhésion
    example: "2026-04-16"

  statut:
    type: string
    enum:
      - EN_ATTENTE
      - ACCEPTEE
      - REFUSEE
    description: Statut de la demande d'adhésion
    example: "EN_ATTENTE"

required:
  - membre_id
  - collectivite_id
  - parrain_id
  - date_demande