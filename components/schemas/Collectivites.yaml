type: object

properties:

  id:
    type: integer
    description: Numéro unique de la collectivité
    example: 1

  nom:
    type: string
    description: Nom unique de la collectivité
    example: "Collectivité Rizicole d'Antananarivo"

  ville:
    type: string
    description: Ville où exerce la collectivité
    example: "Antananarivo"

  specialite:
    type: string
    description: Spécialité agricole de la collectivité
    example: "Riziculture"

  date_creation:
    type: string
    format: date
    description: Date de création de la collectivité
    example: "2020-03-15"

required:
  - nom
  - ville
  - specialite
  - date_creation