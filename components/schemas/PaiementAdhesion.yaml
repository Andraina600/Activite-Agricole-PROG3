type: object

properties:

  id:
    type: integer
    description: Identifiant unique du paiement d'adhésion
    example: 55

  demande_adhesion_id:
    type: integer
    description: Identifiant de la demande d'adhésion associée
    example: 101

  montant:
    type: number
    format: double
    description: Montant du frais d'adhésion en MGA
    example: 50000.0

  mode_paiement:
    type: string
    enum:
      - MOBILE_MONEY
      - VIREMENT_BANCAIRE
    description: Mode de paiement
    example: "MOBILE_MONEY"

  date_paiement:
    type: string
    format: date
    description: Date du paiement
    example: "2026-04-17"

  reference_paiement:
    type: string
    description: Référence ou numéro de transaction du paiement
    example: "TXN-20260417-00123"

required:
  - demande_adhesion_id
  - montant
  - mode_paiement
  - date_paiement
  - reference_paiement