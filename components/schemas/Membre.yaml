type: object

properties:

  id:
    type: integer
    description: Identifiant unique du membre
    example: 42

  nom:
    type: string
    description: Nom de famille du membre
    example: "Rakoto"

  prenom:
    type: string
    description: Prénom du membre
    example: "Jean"

  date_naissance:
    type: string
    format: date
    description: Date de naissance du membre
    example: "1990-07-22"

  genre:
    type: string
    enum:
      - MASCULIN
      - FEMININ
    description: Genre du membre
    example: "MASCULIN"

  adresse:
    type: string
    description: Adresse de résidence du membre
    example: "Lot II J 45, Antananarivo"

  metier:
    type: string
    description: Métier exercé par le membre
    example: "Riziculteur"

  telephone:
    type: string
    description: Numéro de téléphone du membre
    example: "0341234567"

  email:
    type: string
    format: email
    description: Adresse email du membre
    example: "jean.rakoto@email.mg"

  date_adhesion:
    type: string
    format: date
    description: Date d'adhésion du membre à la fédération
    example: "2023-01-10"

  poste:
    type: string
    enum:
      - PRESIDENT
      - PRESIDENT_ADJOINT
      - TRESORIER
      - SECRETAIRE
      - MEMBRE_CONFIRME
      - MEMBRE_JUNIOR
    description: Poste occupé par le membre dans sa collectivité
    example: "MEMBRE_JUNIOR"

  collectivite_id:
    type: integer
    description: Identifiant de la collectivité à laquelle appartient le membre
    example: 1

  actif:
    type: boolean
    description: Indique si le membre est actif (n'a pas démissionné)
    example: true

required:
  - nom
  - prenom
  - date_naissance
  - genre
  - adresse
  - metier
  - telephone
  - email
  - date_adhesion
  - poste
  - collectivite_id