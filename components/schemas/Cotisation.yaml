type: object

properties:

  montant:
    type: number
    format: double
    description: Montant de la cotisation
    example: 4000.0

  date:
    type: string
    format: date
    description: La date de l’encaissement
    example: "2026-04-20"

  type_de_paiement:
    type: string
    description: Mode de paiement
    enum:
      - espece
      - virement_bancaire
      - mobile_money
    example: espece

  type_de_cotisation:
    type: string
    description: Type de cotisation
    enum:
      - mensuelle
      - annuelle
      - ponctuelle
    example: mensuelle

required:
  - montant
  - date
  - type_de_paiement
  - type_de_cotisation

