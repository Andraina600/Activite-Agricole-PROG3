get:
  summary: Pour voir une collectivités grace à son ID
  tags:
    - Collectivites
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Voici la collectivités
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Collectivites.yaml'
    '400':
      description: Erreur au niveau de l'URL
      content:
        application/json:
          schema:
            type: string
            example: "Erreur au niveau de l'URL"
    '404':
      description: Collectivite non trouvé
      content:
        application/json:
          schema:
            type: string
            example: "Collectivités non trouvé"
    '500':
      description: Erreur au niveau du serveur
      content:
        application/json:
          schema:
            type: string
            example: "Erreur au niveau du serveur"
