post:
   summary: Ouvrir une nouvelle collectivités
   tags:
     - Collectivites
   requestBody:
     required: true
     content:
       application/json:
         schema:
           $ref: '../components/schemas/Collectivites.yaml'
   responses:
     '201':
       description: Collectivites créee avec succès
       content:
         application/json:
           schema:
             $ref: '../components/schemas/Collectivites.yaml'
     '400':
       description: Conditions d'ouverture non remplies
       content:
         application/json:
           schema:
             type: string
             example: "Conditions d'ouverture non remplies"
     '403':
       description: Autorisation de la fédération manquante
       content:
         application/json:
           schema:
             type: string
             example: "Autorisation de la fédération manquante"
     '500':
       description: Erreur au niveau du serveur
       content:
         application/json:
           schema:
             type: string
             example: "Erreur au niveau du serveur"

get:
  summary: Récupère la liste des collectivités
  tags:
    - Collectivites
  responses:
    '200':
      description: Liste des collectivités
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/Collectivites.yaml'
    '400':
      description: Erreur au niveau de l'URL
      content:
        application/json:
          schema:
            type: string
            example: "Erreur au niveau de l'URL"
    '500':
      description: Erreur au niveau du serveur
      content:
        application/json:
          schema:
            type: string
            example: "Erreur au niveau du serveur"
