get:
  summary: Récupérer la fiche complète d'un membre
  tags:
    - Membres
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        example: 42
  responses:
    '200':
      description: Membre trouvé
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Membre.yaml'
    '404':
      description: Membre introuvable

patch:
  summary: Mettre à jour les informations personnelles d'un membre
  tags:
    - Membres
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        example: 42
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            adresse:
              type: string
              example: "Lot III K 12, Fianarantsoa"
            telephone:
              type: string
              example: "0349876543"
            email:
              type: string
              format: email
              example: "jean.rakoto.new@email.mg"
            metier:
              type: string
              example: "Maraîcher"
  responses:
    '200':
      description: Informations mises à jour avec succès
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/Membre.yaml'
    '400':
      description: Données invalides
    '404':
      description: Membre introuvable