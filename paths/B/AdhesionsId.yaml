get:
  summary: Consulter l'état d'une demande d'adhésion
  description: >
    Retourne l'état d'avancement d'une demande d'adhésion
    (EN_ATTENTE, ACCEPTEE ou REFUSEE).
  tags:
    - Membres
  parameters:
    - name: id
      in: path
      required: true
      description: Identifiant unique de la demande d'adhésion
      schema:
        type: integer
        example: 101
  responses:
    '200':
      description: Demande d'adhésion trouvée
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/DemandeAdhesion.yaml'
    '404':
      description: Demande d'adhésion introuvable